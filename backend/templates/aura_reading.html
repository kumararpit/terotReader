{% extends "base.html" %}

{% block content %}
<!-- Section 1: Request Details -->
<section>
    <div class="flex items-center gap-3 mb-6 border-b border-slate-200 dark:border-slate-700 pb-2">
        <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
        <h2 class="text-xl font-bold text-slate-800 dark:text-white uppercase tracking-wider">Aura Scan Request</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-y-6 gap-x-12 mb-8">
        <div class="flex flex-col md:col-span-2">
            <span class="text-xs uppercase text-slate-500 dark:text-slate-400 font-semibold mb-1">Submitted By</span>
            <span class="text-lg text-slate-800 dark:text-slate-200">{{ full_name }}</span>
        </div>
    </div>
</section>

<!-- Section 2: Situation Description -->
<section
    class="bg-slate-50 dark:bg-white/5 p-6 rounded-xl border border-dashed border-slate-300 dark:border-slate-700 mb-8">
    <div class="flex items-center gap-3 mb-4">
        <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        <h2 class="text-lg font-bold text-slate-800 dark:text-white uppercase tracking-wider">Situation Description</h2>
    </div>
    <p class="text-slate-700 dark:text-slate-300 leading-relaxed">
        {{ situation_description }}
    </p>
</section>

<!-- Section 3: Uploaded Image -->
<section>
    <div class="flex items-center gap-3 mb-6 border-b border-slate-200 dark:border-slate-700 pb-2">
        <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        <h2 class="text-xl font-bold text-slate-800 dark:text-white uppercase tracking-wider">Aura Image</h2>
    </div>

    <div
        class="flex justify-center items-center bg-slate-100 dark:bg-slate-800/50 p-6 rounded-xl border border-slate-200 dark:border-slate-700">
        <!-- Displaying the base64 image neatly formatted in a styled container -->
        <img src="data:image/png;base64,{{ aura_image }}" alt="Aura Scan Submission"
            class="max-w-full h-auto rounded-lg shadow-md border border-slate-300 dark:border-slate-600"
            style="max-height: 500px; object-fit: contain;">
    </div>
</section>
{% endblock %}
