{% extends "base.html" %}
{% block content %}

<!-- Aura Scan Request -->
<div class="sec">
    <div class="sec-head">
        <span class="ico">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ec5b13" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="3" />
                <path
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
        </span>
        <span class="sec-title">Aura Scan Request</span>
    </div>
    <table class="ft" cellpadding="0" cellspacing="0">
        <tr>
            <td colspan="2" class="nobpad">
                <div class="fl">Submitted By</div>
                <div class="fv">{{ full_name }}</div>
            </td>
        </tr>
    </table>
</div>

<!-- Situation Description -->
<div class="sec">
    <div class="card-d">
        <div style="margin-bottom:10px;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#ec5b13" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"
                style="display:inline-block;vertical-align:middle;margin-right:6px;" xmlns="http://www.w3.org/2000/svg">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
            </svg>
            <span class="sec-title" style="display:inline-block;vertical-align:middle;">Situation Description</span>
        </div>
        <p class="bt">{{ situation_description }}</p>
    </div>
</div>

<!-- Aura Image -->
<div class="sec">
    <div class="sec-head">
        <span class="ico">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ec5b13" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <polyline points="21 15 16 10 5 21" />
            </svg>
        </span>
        <span class="sec-title">Aura Image</span>
    </div>
    <div style="text-align:center;background:#f8fafc;padding:16px;border-radius:8px;border:1.5px solid #e2e8f0;">
        <img src="data:image/png;base64,{{ aura_image }}" alt="Aura Scan"
            style="max-width:100%;max-height:380px;object-fit:contain;border-radius:6px;border:1px solid #e2e8f0;" />
    </div>
</div>

{% endblock %}
