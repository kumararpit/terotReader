{% extends "base.html" %}
{% block content %}

<!-- Live Session Details -->
<div class="sec">
    <div class="sec-head">
        <span class="ico">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ec5b13" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14" />
                <rect x="1" y="6" width="15" height="12" rx="2" ry="2" />
            </svg>
        </span>
        <span class="sec-title">Live Session Details</span>
    </div>
    <table class="ft" cellpadding="0" cellspacing="0">
        <tr>
            <td>
                <div class="fl">Scheduled Date</div>
                <div class="fv">{{ preferred_date }}</div>
            </td>
            <td>
                <div class="fl">Scheduled Time</div>
                <div class="fv">{{ preferred_time }}</div>
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <div class="fl">Meeting Link</div>
                <div class="fv fv-lk">{{ meeting_link }}</div>
            </td>
        </tr>
        <tr>
            <td colspan="2" class="nobpad">
                <hr class="divl" />
                <div class="fl">Reading Focus</div>
                <div class="fv">{{ reading_focus }}</div>
            </td>
        </tr>
    </table>
</div>

<!-- Prepared Questions -->
<div class="sec">
    <div class="card-d">
        <div style="margin-bottom:10px;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#ec5b13" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"
                style="display:inline-block;vertical-align:middle;margin-right:6px;" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" />
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
            <span class="sec-title" style="display:inline-block;vertical-align:middle;">Prepared Questions</span>
        </div>
        <p class="bt">{{ questions }}</p>
    </div>
</div>

{% endblock %}
