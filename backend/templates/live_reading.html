{% extends "base.html" %}

{% block content %}
<!-- Section 1: Session Information -->
<section>
    <div class="flex items-center gap-3 mb-6 border-b border-slate-200 dark:border-slate-700 pb-2">
        <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
        <h2 class="text-xl font-bold text-slate-800 dark:text-white uppercase tracking-wider">Live Session Details</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-y-6 gap-x-12 mb-8">
        <div class="flex flex-col">
            <span class="text-xs uppercase text-slate-500 dark:text-slate-400 font-semibold mb-1">Scheduled Date</span>
            <span class="text-lg text-slate-800 dark:text-slate-200">{{ preferred_date }}</span>
        </div>
        <div class="flex flex-col">
            <span class="text-xs uppercase text-slate-500 dark:text-slate-400 font-semibold mb-1">Scheduled Time</span>
            <span class="text-lg text-slate-800 dark:text-slate-200">{{ preferred_time }}</span>
        </div>
        <div class="flex flex-col md:col-span-2">
            <span class="text-xs uppercase text-slate-500 dark:text-slate-400 font-semibold mb-1">Meeting Link</span>
            <a href="{{ meeting_link }}"
                class="text-lg font-medium text-primary hover:text-orange-500 hover:underline break-all transition-colors">{{
                meeting_link }}</a>
        </div>
        <div class="flex flex-col md:col-span-2 mt-4 pt-6 border-t border-slate-100 dark:border-slate-800">
            <span class="text-xs uppercase text-slate-500 dark:text-slate-400 font-semibold mb-1">Reading Focus</span>
            <span class="text-lg text-slate-800 dark:text-slate-200">{{ reading_focus }}</span>
        </div>
    </div>
</section>

<!-- Section 2: Prepared Questions -->
<section class="bg-slate-50 dark:bg-white/5 p-6 rounded-xl border border-dashed border-slate-300 dark:border-slate-700">
    <div class="flex items-center gap-3 mb-6">
        <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <h2 class="text-lg font-bold text-slate-800 dark:text-white uppercase tracking-wider">Prepared Questions</h2>
    </div>
    <div>
        <p class="text-slate-700 dark:text-slate-300 leading-relaxed font-medium">{{ questions }}</p>
    </div>
</section>
{% endblock %}
